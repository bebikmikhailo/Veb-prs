<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/utils.css">
</head>
<body>
  

  <div class="container">
    <header>
      <div class="light-container">
        <h1>Сонячна електростанція</h1>
      </div>
    </header>
    <main>
      <div class="light-container controls">
        <div class="controls-left-side">
          <button class="update-button shadow-sm">Оновити</button>
          <button class="auto-update-button shadow-sm">Автооновлення</button>
        </div>
      </div>
      <div class="parameters">
        <div class="light-container parameters-container">
          <h3>Сонячна радіація</h3>

          <div class="parameters-info">
            <div>
              <span class="parameters-value">475</span>  
              <span class="parameters-units">Вт/м2</span>
            </div>
            <div class="parameters-visual-status"></div>
          </div>

        </div>
        <div class="light-container parameters-container">
          <h3>Вироблена потужність</h3>
    

          <div class="parameters-info">
            <div>
              <span class="parameters-value">475</span>  
              <span class="parameters-units">кВт</span>
            </div>
            <div class="parameters-visual-status"></div>
          </div>

        </div>
        <div class="light-container parameters-container">
          <h3>Напруга DC</h3>

          <div class="parameters-info">
            <div>
              <span class="parameters-value">475</span>  
              <span class="parameters-units">В</span>
            </div>
            <div class="parameters-visual-status"></div>
          </div>

        </div>
        <div class="light-container parameters-container">
          <h3>Температура панелей</h3>
          
          <div class="parameters-info">
            <div>
              <span class="parameters-value">475</span>  
              <span class="parameters-units">°C</span>
            </div>
            <div class="parameters-visual-status"></div>
          </div>

        </div>
        <div class="light-container parameters-container">
          <h3>Ефективність</h3>
          <div class="parameters-info">
            <div>
              <span class="parameters-value">475</span>  
              <span class="parameters-units">%</span>
            </div>
            <div class="parameters-visual-status"></div>
          </div>
        </div>
      </div>
    </main>
  </div>









  <script src="./scripts/script.js"></script>
</body>
</html>
